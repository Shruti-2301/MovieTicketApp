
<!DOCTYPE html>
<html>
<head>
    <title>Movies</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="navbar">
    <h2>🎬 Movies Section</h2>
    <div>
        <a href="/">Home</a>
        <a href="/movies">Movies</a>
        <a href="/bookings">Bookings</a>
    </div>
</div>

<div class="container">
    <h2>Movie Management (CRUD)</h2>
    <p>Add movie details below and manage movie list.</p>

    <div class="form-box">
        <input type="text" id="title" placeholder="Movie Title">
        <input type="text" id="genre" placeholder="Genre">
        <input type="number" id="duration" placeholder="Duration (minutes)">
        <input type="number" id="price" placeholder="Ticket Price">
       <button id="movieBtn" onclick="addMovie()">➕ Add Movie</button>
<button onclick="clearMovieForm()">Clear</button>
    </div>

    <h3>Movies List</h3>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Genre</th>
                <th>Duration</th>
                <th>Price</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="movieTable"></tbody>
    </table>
</div>

<script src="/static/script.js"></script>
<script>
    loadMovies();
</script>

</body>
</html>
